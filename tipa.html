<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTIENXIOS - Menu TIPA TrollStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #06b6d4;
            --secondary: #3b82f6;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(6, 182, 212, 0.25);
            --text-sub: #94a3b8;
        }

        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            padding: 0;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(6, 182, 212, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent);
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        /* --- CSS MUSIC PLAYER TRÍCH XUẤT TỪ INDEX --- */
        .music-player {
            position: fixed; bottom: 30px; right: 30px; z-index: 999;
            display: flex; align-items: center; gap: 15px;
            background: rgba(15, 23, 42, 0.8);
            padding: 8px 15px; border-radius: 50px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .music-info {
            width: 0; overflow: hidden; opacity: 0;
            transition: 0.5s; display: flex; flex-direction: column; gap: 4px;
        }
        .music-player.active .music-info { width: 150px; opacity: 1; }
        .music-btn {
            width: 45px; height: 45px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: 0.3s;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(6, 182, 212, 0); }
            100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
        }
        .playing { animation: pulse-glow 2s infinite; }
        .progress-container {
            width: 100%; height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 10px; cursor: pointer; position: relative;
        }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; }
        .time-display { font-size: 10px; color: var(--text-sub); display: flex; justify-content: space-between; }

        /* Ô THÔNG TIN TÀI KHOẢN */
        .user-info-bar {
            display: flex; gap: 15px; background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px; border-radius: 15px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
        }
        .info-item { display: flex; flex-direction: column; }
        .info-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .info-value { font-size: 0.9rem; font-weight: 800; color: var(--primary); }

        .nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; flex-wrap: wrap; gap: 20px; }
        .back-btn { 
            padding: 10px 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; color: #fff; text-decoration: none; font-size: 0.9rem; transition: 0.3s;
        }
        .back-btn:hover { background: var(--primary); border-color: var(--primary); transform: translateX(-5px); }

        .header-section { text-align: center; margin-bottom: 50px; }
        .header-title { 
            font-size: 2.5rem; font-weight: 800; margin: 10px 0;
            background: linear-gradient(135deg, #fff 30%, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-desc { color: #94a3b8; font-size: 1rem; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }

        .card { 
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 25px; border-radius: 24px; backdrop-filter: blur(12px);
            position: relative; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden; animation: fadeInUp 0.5s ease backwards;
        }
        .card:hover { transform: translateY(-10px); border-color: rgba(6, 182, 212, 0.4); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }

        .img-container { position: relative; width: 100%; height: 200px; margin-bottom: 20px; }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
        
        .status-badge {
            position: absolute; top: 12px; right: 12px;
            background: rgba(6, 182, 212, 0.2); color: var(--primary); padding: 4px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 700; border: 1px solid var(--glass-border);
        }

        .card h3 { margin: 0; font-size: 1.4rem; font-weight: 800; color: #fff; }
        .card p { color: #94a3b8; font-size: 0.9rem; line-height: 1.6; height: 45px; margin: 10px 0 20px; }

        .purchase-box {
            background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 16px; border: 1px dashed rgba(255, 255, 255, 0.1);
        }
        .label-sm { font-size: 0.75rem; color: var(--primary); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; }

        select { 
            width: 100%; padding: 12px; border-radius: 10px; 
            background: #0f172a; color: #fff; border: 1px solid #334155;
            font-family: inherit; font-weight: 600; outline: none; cursor: pointer;
        }

        .buy-btn { 
            width: 100%; padding: 14px; border-radius: 12px; margin-top: 15px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border: none; color: #fff; font-weight: 800; font-size: 1rem;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

            <div style="font-weight: 800; color: var(--primary);">KTIENXIOS SYSTEM</div>

        <div class="product-grid" id="subProductList"></div>

        </button>
    </div>
