<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - KTIENXIOS System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #06b6d4;
            --secondary: #3b82f6;
            --dark-bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(6, 182, 212, 0.2);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; position: relative; overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
        }

        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-10px) rotate(5deg); } }
        
        .auth-container { width: 100%; max-width: 440px; animation: fadeIn 0.8s ease; position: relative; z-index: 2; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .auth-box {
            background: var(--card-bg); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 32px;
            padding: 50px 40px; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            position: relative; text-align: center;
        }

        .auth-logo {
            width: 75px; height: 75px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 22px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 30px rgba(6, 182, 212, 0.4); animation: float 5s ease-in-out infinite;
        }
        .auth-logo i { font-size: 32px; color: white; }

        .auth-box h1 { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -1px; margin-bottom: 10px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        .input-wrapper { position: relative; margin-top: 8px; }
        .input-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-sub); }
        
        .form-group input {
            width: 100%; padding: 15px 15px 15px 50px; border: 1px solid var(--glass-border);
            border-radius: 15px; font-size: 15px; color: #fff; background: rgba(255, 255, 255, 0.02);
            transition: 0.3s;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); background: rgba(6, 182, 212, 0.05); }

        .form-options { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-sub); margin-bottom: 25px; }
        .form-options a { color: var(--primary); text-decoration: none; font-weight: 600; }

        .btn-login {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 800; font-size: 15px; cursor: pointer;
            transition: 0.4s; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 10px 20px -5px rgba(6, 182, 212, 0.5);
        }
        .btn-login:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 30px -5px rgba(6, 182, 212, 0.6); }

        .toggle-password { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--text-sub); cursor: pointer; }

        /* --- MUSIC PLAYER STYLE --- */
        .music-player {
            position: fixed; bottom: 30px; left: 30px; z-index: 999;
            display: flex; align-items: center; gap: 15px;
            background: rgba(15, 23, 42, 0.8); padding: 8px 15px; border-radius: 50px;
            border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .music-info { width: 0; overflow: hidden; opacity: 0; transition: 0.5s; display: flex; flex-direction: column; gap: 4px; }
        .music-player.active .music-info { width: 150px; opacity: 1; }
        .music-btn {
            width: 45px; height: 45px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(6, 182, 212, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } }
        .playing { animation: pulse-glow 2s infinite; }
        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; }
        .time-display { font-size: 10px; color: var(--text-sub); display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo"><i class="fas fa-crown"></i></div>
            <h1>CHÀO MỪNG TRỞ LẠI</h1>
            <p style="color:var(--text-sub); margin-bottom: 35px;">Vui lòng đăng nhập để tiếp tục</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="loginEmail" placeholder="Email đăng nhập" required>
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" id="pass" placeholder="Mật khẩu" required>
                        <i class="fas fa-lock input-icon"></i>
                        <i class="fas fa-eye toggle-password" onclick="toggle()"></i>
                    </div>
                </div>
                
                <div class="form-options">
                    <label style="display:flex; align-items:center; gap:5px; cursor:pointer;">
                        <input type="checkbox"> Ghi nhớ
                    </label>
                    <a href="#">Quên mật khẩu?</a>
                </div>
                
                <button type="submit" class="btn-login">ĐĂNG NHẬP HỆ THỐNG</button>
            </form>
            
            <p style="margin-top: 30px; color:var(--text-sub); font-size:14px;">
                Chưa có tài khoản? <a href="signup.html" style="color:var(--primary); text-decoration:none; font-weight:700;">Đăng ký ngay</a>
            </p>
        </div>
    </div>

    <!-- Music Player -->
    <div class="music-player" id="musicContainer">
        <div class="music-info">
            <div style="font-size: 11px; font-weight: 700; white-space: nowrap; color: #fff;">BGM - KTIENXIOS</div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="time-display">
                <span id="currTime">0:00</span>
                <span id="durTime">0:00</span>
            </div>
        </div>
        <audio id="myAudio" loop>
            <source src="https://scared-aquamarine-wzjsbpfpzz.edgeone.app/snaptt.me-48765111.mp3" type="audio/mpeg">
        </audio>
        <button class="music-btn" onclick="toggleMusic()" id="musicBtn">
            <i class="fas fa-music"></i>
        </button>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDWe6sAcxUyis87c8GPLFwo5Z0zS3eO-34",
            authDomain: "severupdate-1b36a.firebaseapp.com",
            databaseURL: "https://severupdate-1b36a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "severupdate-1b36a",
            storageBucket: "severupdate-1b36a.firebasestorage.app",
            messagingSenderId: "123894557961",
            appId: "1:123894557961:web:c0c9ec59fb65f71da937d8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function toggle() {
            const p = document.getElementById('pass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('pass').value;

            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    alert("Đăng nhập thành công!");
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => alert("Sai thông tin: " + error.message));
        });

// --- LOGIC NHẠC TỰ ĐỘNG KHI CHẠM ---
const audio = document.getElementById("myAudio");
const musicBtn = document.getElementById("musicBtn");
const musicContainer = document.getElementById("musicContainer");

// 1. Cấu hình nguồn nhạc từ products.js
if (typeof KTIENXIOS_CONFIG !== 'undefined') {
    const musicSource = audio.querySelector('source');
    musicSource.src = KTIENXIOS_CONFIG.musicUrl;
    audio.load();
    
    const titleDisplay = document.querySelector('.music-info div');
    if (titleDisplay) titleDisplay.innerText = KTIENXIOS_CONFIG.musicTitle;
}

// 2. Hàm cập nhật giao diện
function updateMusicUI(isPlaying) {
    if (isPlaying) {
        musicBtn.classList.add('playing');
        musicBtn.innerHTML = '<i class="fas fa-pause"></i>';
        if(musicContainer) musicContainer.classList.add('active');
    } else {
        musicBtn.classList.remove('playing');
        musicBtn.innerHTML = '<i class="fas fa-music"></i>';
        if(musicContainer) musicContainer.classList.remove('active');
    }
}

// 3. Hàm xử lý phát nhạc (Fix lỗi trình duyệt chặn)
function playMusic() {
    audio.play().then(() => {
        localStorage.setItem('musicPlaying', 'true');
        updateMusicUI(true);
        // Sau khi đã phát thành công, gỡ bỏ sự kiện lắng nghe để tránh phát lại khi chạm tiếp
        document.removeEventListener('click', playMusic);
        document.removeEventListener('touchstart', playMusic);
    }).catch(err => console.log("Trình duyệt chờ tương tác..."));
}

// 4. Lắng nghe tương tác đầu tiên trên màn hình để mở nhạc
if (localStorage.getItem('musicPlaying') !== 'false') {
    document.addEventListener('click', playMusic);
    document.addEventListener('touchstart', playMusic);
}

// 5. Nút bấm thủ công (Bật/Tắt)
function toggleMusic() {
    if (audio.paused) {
        audio.play();
        localStorage.setItem('musicPlaying', 'true');
        updateMusicUI(true);
    } else {
        audio.pause();
        localStorage.setItem('musicPlaying', 'false');
        updateMusicUI(false);
    }
}

// 6. Đồng bộ thời gian nhạc khi chuyển trang
audio.addEventListener('timeupdate', () => {
    localStorage.setItem('musicTime', audio.currentTime);
});

window.addEventListener('load', () => {
    const savedTime = localStorage.getItem('musicTime');
    const isPlaying = localStorage.getItem('musicPlaying');
    if (savedTime) audio.currentTime = parseFloat(savedTime);
    if (isPlaying === 'true') {
        playMusic();
    }
});
    </script>
</body>
</html>
