<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTIENXIOS - Dashboard Hệ Thống</title>
    <link rel="icon" type="image/x-icon" href="https://cdn.phototourl.com/member/2026-05-01-b19a8e62-500c-415f-9502-77eecc2206c0.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase SDK (Bản Compat ổn định) -->
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; overflow-x: hidden; background-color: #020617; scroll-behavior: smooth; }
    :root {
        --primary: #06b6d4; --secondary: #3b82f6; --dark-bg: #020617; 
        --card-bg: rgba(15, 23, 42, 0.7); --glass-border: rgba(6, 182, 212, 0.25); 
        --text-main: #f8fafc; --text-sub: #94a3b8;
    }

    .lnd-body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--dark-bg); color: var(--text-main);
        background-image: radial-gradient(circle at 10% 20%, rgba(6, 182, 212, 0.1) 0%, transparent 40%),
            radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
            linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
        background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        min-height: 100vh;
    }
    
    .lnd-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 2; }
    
    @keyframes slide-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .lnd-nav {
        position: fixed; top: 0; left: 0; right: 0; height: 70px; z-index: 1000;
        background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border);
    }
    .lnd-nav .lnd-container { height: 100%; display: flex; justify-content: space-between; align-items: center; }
    .logo-text { font-weight: 800; font-size: 1.4rem; background: linear-gradient(135deg, #22d3ee 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .btn-menu {
        padding: 10px 20px; border-radius: 12px; font-weight: 700;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px;
        transition: 0.3s; box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
    }

    .user-sidebar {
        position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
        background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
        border-left: 1px solid var(--glass-border); z-index: 3000;
        padding: 40px 25px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .user-sidebar.active { right: 0; }
    
    .sidebar-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); z-index: 2999; display: none;
    }
    .sidebar-overlay.active { display: block; }

    .menu-link {
        display: flex; align-items: center; gap: 15px; padding: 15px;
        color: var(--text-main); text-decoration: none; border-radius: 12px;
        margin-bottom: 10px; transition: 0.3s; font-weight: 600;
        background: rgba(255,255,255,0.02); border: 1px solid transparent;
        cursor: pointer;
    }
    .menu-link:hover { background: rgba(6, 182, 212, 0.1); border-color: var(--glass-border); color: var(--primary); }

    .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
    .p-card { background: var(--card-bg); border: 1px solid var(--glass-border); padding: 25px; border-radius: 24px; transition: 0.4s; backdrop-filter: blur(10px); position: relative; overflow: hidden; display: flex; flex-direction: column; }
    .p-img { width: 100%; height: 180px; object-fit: cover; border-radius: 16px; margin-bottom: 20px; }
    
    .btn-lnd { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 32px; border-radius: 14px; font-weight: 700; text-decoration: none; transition: 0.4s; cursor: pointer; border: none; margin-top: auto; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; width: 100%; }

    /* --- PHẦN THỐNG KÊ KHO (ACC CLONE) --- */
    .stock-info {
        display: flex; gap: 10px; margin-bottom: 15px;
    }
    .stock-badge {
        font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 8px;
        background: rgba(6, 182, 212, 0.1); border: 1px solid rgba(6, 182, 212, 0.2);
    }
    .sold-badge {
        font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 8px;
        background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2);
        color: #fbbf24;
    }

    /* --- MUSIC PLAYER STYLE --- */
    .music-player {
        position: fixed; bottom: 30px; right: 30px; z-index: 999;
        display: flex; align-items: center; gap: 15px;
        background: rgba(15, 23, 42, 0.8); padding: 8px 15px; border-radius: 50px;
        border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
        transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .music-info { width: 0; overflow: hidden; opacity: 0; transition: 0.5s; display: flex; flex-direction: column; gap: 4px; }
    .music-player.active .music-info { width: 150px; opacity: 1; }
    .music-btn {
        width: 45px; height: 45px; border-radius: 50%; 
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(6, 182, 212, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } }
    .playing { animation: pulse-glow 2s infinite; }
    .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; position: relative; }
    .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; }
    .time-display { font-size: 10px; color: var(--text-sub); display: flex; justify-content: space-between; }

    .reveal { opacity: 0; transform: translateY(40px); transition: 0.8s ease-out; }
    .reveal.active { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="lnd-body">
    <nav class="lnd-nav">
        <div class="lnd-container">
            <a href="index.html" style="text-decoration:none; display:flex; align-items:center; gap:8px;">
                <div style="width:32px; height:32px; background:linear-gradient(135deg, var(--primary), var(--secondary)); border-radius:8px; display:flex; align-items:center; justify-content:center;">
                    <i class="fas fa-bolt" style="color: #fff; font-size: 0.9rem;"></i>
                </div>
                <span class="logo-text">KTIENXIOS</span>
            </a>
            <button class="btn-menu" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i> MENU
            </button>
        </div>
    </nav>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="user-sidebar" id="userSidebar">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="width: 70px; height: 70px; background: rgba(6, 182, 212, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; border: 2px solid var(--primary);">
                <i class="fas fa-user-astronaut" style="font-size: 2rem; color: var(--primary);"></i>
            </div>
            <h3 id="userNameDisplay" style="color: #fff;">Đang tải...</h3>
            <p id="userBalanceDisplay" style="color: #fbbf24; font-weight: 800; font-size: 0.9rem;">Số dư: ---</p>
        </div>

        <nav>
            <a href="nap-tien.html" class="menu-link"><i class="fas fa-wallet"></i> Nạp Tiền Bank</a>
            <a href="#dashboardProductList" class="menu-link" onclick="toggleSidebar()"><i class="fas fa-shopping-cart"></i> Mua Sản Phẩm</a>
            <a href="lichsu.html" class="menu-link"><i class="fas fa-history"></i> Lịch Sử Mua</a>
            <div onclick="logout()" class="menu-link" style="margin-top: 50px; color: #ef4444;"><i class="fas fa-sign-out-alt"></i> Đăng Xuất</div>
        </nav>
    </div>

    <section class="lnd-hero" style="padding: 140px 0 40px;">
        <div class="lnd-container">
            <h1 class="hero-title reveal">XIN CHÀO, <span id="heroName">USER</span></h1>
            <p class="reveal" style="color:var(--text-sub); margin-bottom:20px;">Chào mừng ông giáo! Hãy chọn dịch vụ và trải nghiệm nhé.</p>
        </div>
    </section>

    <section class="lnd-container reveal" style="padding-bottom:100px;">
        <div class="product-grid" id="dashboardProductList"></div>
    </section>

    <!-- Music Player -->
    <div class="music-player" id="musicContainer">
        <div class="music-info">
            <div id="musicTitleDisplay" style="font-size: 11px; font-weight: 700; white-space: nowrap;">BGM - KTIENXIOS</div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="time-display">
                <span id="currTime">0:00</span>
                <span id="durTime">0:00</span>
            </div>
        </div>
        <audio id="myAudio" loop>
            <source src="" type="audio/mpeg">
        </audio>
        <button class="music-btn" onclick="toggleMusic()" id="musicBtn">
            <i class="fas fa-music"></i>
        </button>
    </div>

    <footer style="padding:40px 0; text-align:center; border-top:1px solid var(--glass-border);">
        <p style="color:var(--text-sub); font-size:0.9rem;">&copy; 2026 KTIENXIOS - Dashboard.</p>
    </footer>
</div>

<script src="products.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDWe6sAcxUyis87c8GPLFwo5Z0zS3eO-34",
        authDomain: "severupdate-1b36a.firebaseapp.com",
        databaseURL: "https://severupdate-1b36a-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "severupdate-1b36a",
        storageBucket: "severupdate-1b36a.firebasestorage.app",
        messagingSenderId: "123894557961",
        appId: "1:123894557961:web:c0c9ec59fb65f71da937d8"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    auth.onAuthStateChanged(user => {
        if (user) {
            const userEmail = user.email;
            const safeEmail = userEmail.replace(/\./g, '_');
            const displayName = userEmail.split('@')[0];
            document.getElementById('userNameDisplay').innerText = "Chào, " + displayName + "!";
            document.getElementById('heroName').innerText = displayName.toUpperCase();
            loadBalance(safeEmail);
            renderDashboardProducts(userEmail, safeEmail);
        } else {
            window.location.href = "index.html";
        }
    });

    function loadBalance(safeEmail) {
        database.ref('Users/' + safeEmail).on('value', (snapshot) => {
            const data = snapshot.val();
            const balance = (data && data.balance) ? data.balance : 0;
            document.getElementById('userBalanceDisplay').innerText = `Số dư: ${balance.toLocaleString()}đ`;
        });
    }

    function logout() {
        if(confirm("Ông giáo muốn đăng xuất à?")) {
            auth.signOut().then(() => {
                window.location.href = "index.html";
            });
        }
    }

    function renderDashboardProducts(userEmail, safeEmail) {
        const container = document.getElementById('dashboardProductList'); 
        if(!container || typeof KTIENXIOS_PRODUCTS === 'undefined') return;

        let html = '';
        KTIENXIOS_PRODUCTS.forEach(p => {
            let actionArea = '';
            let priceLabel = '';
            let stockStats = '';

            if (p.isClone) {
                priceLabel = `<span id="price-dash-${p.id}">${p.price.toLocaleString()}</span>đ / Acc`;
                // Khu vực hiển thị Còn lại & Đã bán
                stockStats = `
                    <div class="stock-info">
                        <div class="stock-badge"><i class="fas fa-boxes"></i> Còn: <span id="stock-count-${p.id}">0</span></div>
                        <div class="sold-badge"><i class="fas fa-shopping-basket"></i> Bán: <span id="sold-count-${p.id}">0</span></div>
                    </div>`;
                
                actionArea = `
                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.75rem; color: var(--text-sub);">Nhập số lượng mua:</label>
                        <input type="number" id="qty-dash-${p.id}" value="1" min="1" 
                            style="width: 100%; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); outline: none; margin-top: 5px; font-weight: 600;">
                    </div>`;
                
                // Gọi hàm đếm dữ liệu ngay sau khi render
                updateStockUI(p.id, p.name);

            } else {
                const firstPrice = p.options ? p.options[0].price : "0đ";
                priceLabel = `<span id="price-dash-${p.id}">${firstPrice}</span>`;
                actionArea = `
                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.75rem; color: var(--text-sub);">Chọn gói dịch vụ:</label>
                        <select id="select-${p.id}" onchange="updateDashPrice(this, '${p.id}')" style="width: 100%; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); outline: none; margin-top: 5px; cursor: pointer;">
                            ${p.options ? p.options.map(opt => `<option value="${opt.price}">${opt.label} - ${opt.price}</option>`).join('') : ''}
                        </select>
                    </div>`;
            }

            html += `
                <div class="p-card">
                    <div style="position:relative; width:100%;">
                        <img src="${p.img}" class="p-img">
                        <div style="position:absolute; top:10px; right:10px; background:var(--primary); color:#fff; padding:5px 12px; border-radius:50px; font-size:0.7rem; font-weight:800; z-index:10; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                            ${priceLabel}
                        </div>
                    </div>
                    <h3>${p.name}</h3>
                    ${stockStats}
                    <p style="color:var(--text-sub); font-size:0.9rem; margin-bottom:15px; min-height:40px;">${p.desc}</p>
                    ${actionArea}
                    <button id="btn-buy-${p.id}" onclick="payProduct('${p.id}', '${userEmail}', '${safeEmail}', ${p.isClone ? 'true' : 'false'})" class="btn-lnd btn-primary">MUA NGAY</button>
                </div>`;
        });
        container.innerHTML = html;
        reveal();
    }

    // --- HÀM CẬP NHẬT SỐ LƯỢNG KHO VÀ ĐÃ BÁN ---
    function updateStockUI(productId, productName) {
        // Đếm hàng còn lại (Đường dẫn Stock/1)
        database.ref('Stock/1').on('value', (snapshot) => {
            const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
            const element = document.getElementById(`stock-count-${productId}`);
            if(element) element.innerText = count;
        });

        // Đếm đã bán (Quét trong Orders)
        database.ref('Orders').on('value', (snapshot) => {
            let soldCount = 0;
            if(snapshot.exists()) {
                const orders = snapshot.val();
                for(let key in orders) {
                    // Nếu tên sản phẩm trong Order chứa tên sản phẩm hiện tại
                    if(orders[key].product && orders[key].product.includes(productName)) {
                        // Trích xuất số lượng (xN) từ chuỗi "Product Name (xN)"
                        const match = orders[key].product.match(/\(x(\d+)\)/);
                        soldCount += match ? parseInt(match[1]) : 1;
                    }
                }
            }
            const element = document.getElementById(`sold-count-${productId}`);
            if(element) element.innerText = soldCount;
        });
    }

    function updateDashPrice(selectElement, productId) {
        const priceDisplay = document.getElementById(`price-dash-${productId}`);
        if (priceDisplay) priceDisplay.innerText = selectElement.value;
    }
    
    async function payProduct(id, userEmail, safeEmail, isClone) {
        const product = KTIENXIOS_PRODUCTS.find(item => item.id == id);
        let finalPrice = 0;
        let buyQuantity = 1;

        if (isClone) {
            buyQuantity = parseInt(document.getElementById(`qty-dash-${id}`).value) || 1;
            if(buyQuantity < 1) { alert("Số lượng không hợp lệ!"); return; }
            finalPrice = product.price * buyQuantity;
        } else {
            const selectBox = document.getElementById(`select-${id}`);
            const selectedPriceText = selectBox ? selectBox.value : "0đ";
            finalPrice = parseInt(selectedPriceText.replace(/\D/g, '')) || 0;
        }

        if(!confirm(`Xác nhận thanh toán ${finalPrice.toLocaleString()}đ cho ${product.name}?`)) return;

        const btn = document.getElementById(`btn-buy-${id}`);
        btn.disabled = true;
        btn.innerText = "ĐANG XỬ LÝ...";

        try {
            const userRef = database.ref('Users/' + safeEmail);
            const userSnap = await userRef.once('value');
            const userData = userSnap.val();

            if (!userData || (userData.balance || 0) < finalPrice) {
                alert("❌ Số dư không đủ!");
                btn.disabled = false; btn.innerText = "MUA NGAY";
                return;
            }

            let resultData = ""; 

            if (isClone) {
                const stockRef = database.ref('Stock/1');
                const stockSnap = await stockRef.limitToFirst(buyQuantity).once('value');
                const stockData = stockSnap.val();

                if (!stockData || Object.keys(stockData).length < buyQuantity) {
                    alert("❌ Hết hàng trong kho hoặc không đủ số lượng!");
                    btn.disabled = false; btn.innerText = "MUA NGAY";
                    return;
                }

                const accounts = [];
                for (const key in stockData) {
                    accounts.push(stockData[key]);
                    await database.ref(`Stock/1/${key}`).remove(); 
                }
                resultData = accounts.join(' | '); 
            } else {
                resultData = "KTX-" + Math.random().toString(36).substring(2, 12).toUpperCase();
            }

            const newBalance = userData.balance - finalPrice;
            await userRef.update({ balance: newBalance });

            await database.ref('Orders').push({
                user: userEmail,
                product: product.name + (isClone ? ` (x${buyQuantity})` : ''),
                price: finalPrice,
                key: resultData, 
                date: new Date().toLocaleString('vi-VN'),
                type: isClone ? 'buy_clone' : 'buy_key'
            });

            alert("✅ Thành công! Đã lấy tài khoản từ kho.");
            window.location.href = "lichsu.html";

        } catch (e) {
            console.error(e);
            alert("Lỗi hệ thống: " + e.message);
            btn.disabled = false;
            btn.innerText = "MUA NGAY";
        }
    }

    function reveal() {
        document.querySelectorAll(".reveal").forEach(r => {
            if (r.getBoundingClientRect().top < window.innerHeight - 80) r.classList.add("active");
        });
    }
    window.addEventListener("scroll", reveal);

    function toggleSidebar() {
        document.getElementById('userSidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    const audio = document.getElementById("myAudio");
    const musicBtn = document.getElementById("musicBtn");
    const musicContainer = document.getElementById("musicContainer");

    if (typeof KTIENXIOS_CONFIG !== 'undefined') {
        const musicSource = audio.querySelector('source');
        musicSource.src = KTIENXIOS_CONFIG.musicUrl;
        audio.load();
        const titleDisplay = document.getElementById('musicTitleDisplay');
        if (titleDisplay) titleDisplay.innerText = KTIENXIOS_CONFIG.musicTitle;
    }

    function updateMusicUI(isPlaying) {
        if (isPlaying) {
            musicBtn.classList.add('playing');
            musicBtn.innerHTML = '<i class="fas fa-pause"></i>';
            if(musicContainer) musicContainer.classList.add('active');
        } else {
            musicBtn.classList.remove('playing');
            musicBtn.innerHTML = '<i class="fas fa-music"></i>';
            if(musicContainer) musicContainer.classList.remove('active');
        }
    }

    function playMusic() {
        audio.play().then(() => {
            localStorage.setItem('musicPlaying', 'true');
            updateMusicUI(true);
            document.removeEventListener('click', playMusic);
            document.removeEventListener('touchstart', playMusic);
        }).catch(err => console.log("Chờ tương tác..."));
    }

    if (localStorage.getItem('musicPlaying') !== 'false') {
        document.addEventListener('click', playMusic);
        document.addEventListener('touchstart', playMusic);
    }

    function toggleMusic() {
        if (audio.paused) {
            audio.play();
            localStorage.setItem('musicPlaying', 'true');
            updateMusicUI(true);
        } else {
            audio.pause();
            localStorage.setItem('musicPlaying', 'false');
            updateMusicUI(false);
        }
    }

    audio.addEventListener('timeupdate', () => {
        localStorage.setItem('musicTime', audio.currentTime);
        if (audio.duration) {
            const progress = (audio.currentTime / audio.duration) * 100;
            const bar = document.getElementById('progressBar');
            if(bar) bar.style.width = progress + "%";
            const curr = formatTime(audio.currentTime);
            const dur = formatTime(audio.duration);
            document.getElementById('currTime').innerText = curr;
            document.getElementById('durTime').innerText = dur;
        }
    });

    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return min + ":" + (sec < 10 ? "0" + sec : sec);
    }

    window.addEventListener('load', () => {
        const savedTime = localStorage.getItem('musicTime');
        const isPlaying = localStorage.getItem('musicPlaying');
        if (savedTime) audio.currentTime = parseFloat(savedTime);
        if (isPlaying === 'true') {
            playMusic();
        }
    });
</script>
</body>
</html>
