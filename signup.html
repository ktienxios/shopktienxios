<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - KTIENXIOS System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #06b6d4;
            --secondary: #3b82f6;
            --gold: #fbbf24;
            --dark-bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(6, 182, 212, 0.2);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; position: relative; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.1) 0%, transparent 80%),
                              linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .auth-container { width: 100%; max-width: 480px; position: relative; z-index: 1; animation: slideUp 0.6s ease-out; }

        .auth-box {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative; overflow: hidden;
        }

        .auth-box::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
            animation: loading-bar 3s infinite;
        }
        @keyframes loading-bar { 0% { left: -100%; } 100% { left: 100%; } }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-logo {
            width: 65px; height: 65px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 18px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.4); animation: float 4s ease-in-out infinite;
        }
        .auth-logo i { font-size: 28px; color: white; }
        .auth-header h1 { font-size: 24px; font-weight: 800; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 12px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-sub); transition: 0.3s; }
        
        .form-group input {
            width: 100%; padding: 13px 16px 13px 45px; border: 1px solid var(--glass-border);
            border-radius: 12px; font-size: 14px; color: #fff; background: rgba(255, 255, 255, 0.03);
            transition: 0.3s; font-family: inherit;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); background: rgba(6, 182, 212, 0.05); box-shadow: 0 0 15px rgba(6, 182, 212, 0.1); }
        .form-group input:focus + .input-icon { color: var(--primary); }

        .btn-auth {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 800; font-size: 14px; cursor: pointer;
            transition: 0.3s; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(6, 182, 212, 0.4); }

        .auth-footer { text-align: center; margin-top: 25px; border-top: 1px solid var(--glass-border); padding-top: 20px; }
        .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 700; }

        /* --- MUSIC PLAYER STYLE --- */
        .music-player {
            position: fixed; bottom: 20px; right: 20px; z-index: 999;
            display: flex; align-items: center; gap: 12px;
            background: rgba(15, 23, 42, 0.8); padding: 8px 12px; border-radius: 50px;
            border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .music-info { width: 0; overflow: hidden; opacity: 0; transition: 0.5s; display: flex; flex-direction: column; gap: 4px; }
        .music-player.active .music-info { width: 130px; opacity: 1; }
        .music-btn {
            width: 40px; height: 40px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); } 70% { box-shadow: 0 0 0 12px rgba(6, 182, 212, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } }
        .playing { animation: pulse-glow 2s infinite; }
        .progress-container { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; }
        .time-display { font-size: 9px; color: var(--text-sub); display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-logo"><i class="fas fa-user-plus"></i></div>
                <h1>KHỞI TẠO TÀI KHOẢN</h1>
                <p style="color:var(--text-sub); font-size:14px; margin-top:5px;">Gia nhập cộng đồng KTIENXIOS ngay</p>
            </div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label>Tên Đăng Nhập</label>
                    <div class="input-wrapper">
                        <input type="text" id="regUsername" placeholder="Username" required>
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Địa Chỉ Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="regEmail" placeholder="email@example.com" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Mật Khẩu</label>
                    <div class="input-wrapper">
                        <input type="password" id="regPass" placeholder="••••••••" required>
                        <i class="fas fa-lock input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Xác Nhận</label>
                    <div class="input-wrapper">
                        <input type="password" id="regConfirm" placeholder="••••••••" required>
                        <i class="fas fa-shield-check input-icon"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn-auth" id="submitBtn">
                    <span>Đăng Ký Ngay</span>
                    <i class="fas fa-rocket"></i>
                </button>
            </form>
            
            <div class="auth-footer">
                <p style="color:var(--text-sub); font-size:14px;">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
            </div>
        </div>
    </div>

    <!-- Music Player -->
    <div class="music-player" id="musicContainer">
        <div class="music-info">
            <div style="font-size: 10px; font-weight: 700; white-space: nowrap;">BGM - KTIENXIOS</div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="time-display">
                <span id="currTime">0:00</span>
                <span id="durTime">0:00</span>
            </div>
        </div>
        <audio id="myAudio" loop>
            <source src="https://scared-aquamarine-wzjsbpfpzz.edgeone.app/snaptt.me-48765111.mp3" type="audio/mpeg">
        </audio>
        <button class="music-btn" onclick="toggleMusic()" id="musicBtn">
            <i class="fas fa-music"></i>
        </button>
    </div>
