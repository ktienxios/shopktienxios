<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lịch Sử Giao Dịch - KTIENXIOS</title>
    <link rel="icon" type="image/x-icon" href="https://cdn.phototourl.com/member/2026-05-01-b19a8e62-500c-415f-9502-77eecc2206c0.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
        --primary: #06b6d4; --secondary: #3b82f6; --dark-bg: #020617; 
        --card-bg: rgba(30, 41, 59, 0.5); --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #f8fafc; --text-sub: #94a3b8;
    }
    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--dark-bg); color: var(--text-main);
        background-image: radial-gradient(circle at 50% 0%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
        min-height: 100vh; overflow-x: hidden; padding-bottom: 80px;
    }
    .container { max-width: 600px; margin: 0 auto; padding: 15px; }
    
    .header { margin-bottom: 20px; padding-top: 10px; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 1.3rem; font-weight: 800; }
    .back-btn { width: 38px; height: 38px; border-radius: 10px; background: var(--card-bg); border: 1px solid var(--glass-border); color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; }

    .tab-container {
        display: flex; background: rgba(0,0,0,0.2); border-radius: 14px;
        padding: 5px; margin-bottom: 20px; border: 1px solid var(--glass-border);
    }
    .tab-btn {
        flex: 1; padding: 10px; border: none; background: transparent;
        color: var(--text-sub); font-weight: 700; font-size: 0.85rem;
        cursor: pointer; border-radius: 10px; transition: 0.3s;
    }
    .tab-btn.active {
        background: var(--primary); color: white;
        box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
    }

    .history-item {
        background: var(--card-bg); border: 1px solid var(--glass-border);
        border-radius: 16px; padding: 12px; margin-bottom: 12px;
        display: flex; align-items: center; gap: 12px; backdrop-filter: blur(10px);
    }

    .download-square {
        min-width: 50px; height: 50px;
        background: linear-gradient(135deg, var(--primary), #3b82f6);
        border-radius: 10px; display: flex; flex-direction: column;
        align-items: center; justify-content: center; color: white;
        text-decoration: none; font-size: 0.55rem; font-weight: 800; text-align: center; flex-shrink: 0;
    }
    .download-square i { font-size: 1.1rem; margin-bottom: 1px; }

    .recharge-icon {
        min-width: 50px; height: 50px; background: rgba(16, 185, 129, 0.1);
        border-radius: 10px; display: flex; align-items: center; justify-content: center;
        color: #10b981; font-size: 1.2rem; border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .info-box { flex-grow: 1; min-width: 0; } 
    .title-text { font-weight: 700; font-size: 0.85rem; color: #fff; margin-bottom: 4px; }
    .sub-text { font-size: 0.7rem; color: var(--text-sub); }

    .key-badge { 
        display: inline-flex; align-items: center; gap: 6px; 
        background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 6px; 
        margin-top: 5px; border: 1px solid rgba(255,255,255,0.05);
    }
    .key-text { font-family: monospace; color: #4ade80; font-size: 0.7rem; font-weight: 700; }
    
    .status-box { 
        min-width: 100px; text-align: right; border-left: 1px solid rgba(255,255,255,0.1);
        padding-left: 8px; flex-shrink: 0;
    }
    .status-label { font-size: 0.55rem; color: var(--text-sub); display: block; margin-bottom: 2px; }
    .status-value { font-weight: 800; font-size: 0.85rem; display: block; }
    .expiry-date { font-size: 0.6rem; color: #94a3b8; margin-top: 2px; display: block; font-weight: 500; }

    .empty-msg { text-align: center; padding: 40px; color: var(--text-sub); font-size: 0.9rem; }

    .music-player {
        position: fixed; bottom: 20px; left: 20px; z-index: 999;
        display: flex; align-items: center; gap: 12px;
        background: rgba(15, 23, 42, 0.8); padding: 8px 12px; border-radius: 50px;
        border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
        transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .music-info { width: 0; overflow: hidden; opacity: 0; transition: 0.5s; display: flex; flex-direction: column; gap: 4px; }
    .music-player.active .music-info { width: 140px; opacity: 1; }
    .music-btn {
        width: 40px; height: 40px; border-radius: 50%; 
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } }
    .playing { animation: pulse-glow 2s infinite; }
</style>
</head>
<body>

<div class="container">
    <header class="header">
        <a href="dashboard.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <h1>Lịch Sử Giao Dịch</h1>
    </header>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('keys')">LỊCH SỬ KEY</button>
        <button class="tab-btn" onclick="switchTab('recharge')">LỊCH SỬ NẠP</button>
    </div>

    <div id="content-list">
        <div class="empty-msg">Đang tải dữ liệu...</div>
    </div>
</div>

<div class="music-player" id="musicContainer">
    <div class="music-info">
        <div style="font-size: 10px; font-weight: 700; white-space: nowrap; color: #fff;">BGM - KTIENXIOS</div>
        <div style="font-size: 9px; color: var(--text-sub);">Now Playing...</div>
    </div>
    <audio id="myAudio" loop>
        <source src="https://scared-aquamarine-wzjsbpfpzz.edgeone.app/snaptt.me-48765111.mp3" type="audio/mpeg">
    </audio>
    <button class="music-btn" onclick="toggleMusic()" id="musicBtn">
        <i class="fas fa-music"></i>
    </button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDWe6sAcxUyis87c8GPLFwo5Z0zS3eO-34",
        authDomain: "severupdate-1b36a.firebaseapp.com",
        databaseURL: "https://severupdate-1b36a-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "severupdate-1b36a",
        storageBucket: "severupdate-1b36a.firebasestorage.app",
        messagingSenderId: "123894557961",
        appId: "1:123894557961:web:c0c9ec59fb65f71da937d8"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let currentTab = 'keys';
    let userEmail = '';

    auth.onAuthStateChanged(user => {
        if (user) {
            userEmail = user.email;
            loadKeysHistory();
        } else {
            window.location.href = "index.html";
        }
    });

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(event) event.target.classList.add('active');
        
        if (tab === 'keys') loadKeysHistory();
        else loadRechargeHistory();
    }

    // --- ĐÃ FIX: TỰ ĐỘNG NHẬN DIỆN DỰA TRÊN GIÁ TIỀN VÀ CHUỖI NGÀY THÁNG FIREBASE ---
    function getExpiryInfo(order) {
        let days = 0;
        let label = "";
        
        const price = parseInt(order.price) || 0;
        const name = (order.product || "").toLowerCase();

        // Ưu tiên nhận diện theo giá tiền từ Firebase
        if (price === 5000) { days = 1; label = "1 Ngày"; }
        else if (price === 20000 || price === 25000) { days = 7; label = "7 Ngày"; }
        else if (price === 50000 || price === 100000) { days = 30; label = "30 Ngày"; }
        
        // Nếu giá không khớp đặc biệt, quét từ khóa trong tên
        if (days === 0) {
            if (name.includes("1 ngày") || name.includes("1 day")) { days = 1; label = "1 Ngày"; }
            else if (name.includes("7 ngày") || name.includes("7 day")) { days = 7; label = "7 Ngày"; }
            else if (name.includes("30 ngày") || name.includes("30 day")) { days = 30; label = "30 Ngày"; }
            else { days = 30; label = "30 Ngày"; } 
        }

        // Tách chuỗi ngày tháng "20:23:52 1/5/2026" từ Firebase
        let buyDate = new Date();
        if (order.date) {
            try {
                const parts = order.date.split(' ');
                const dateParts = parts[1].split('/');
                const timeParts = parts[0].split(':');
                buyDate = new Date(dateParts[2], dateParts[1] - 1, dateParts[0], timeParts[0], timeParts[1], timeParts[2]);
            } catch(e) { buyDate = new Date(); }
        }

        const expiryDate = new Date(buyDate);
        expiryDate.setDate(buyDate.getDate() + days);
        
        const d = expiryDate.getDate().toString().padStart(2, '0');
        const m = (expiryDate.getMonth() + 1).toString().padStart(2, '0');
        const y = expiryDate.getFullYear();
        
        return { label: label, date: `Hết hạn: ${d}/${m}/${y}` };
    }

    function loadKeysHistory() {
        const list = document.getElementById('content-list');
        list.innerHTML = '<div class="empty-msg">Đang tải lịch sử mua...</div>';

        database.ref('Orders').orderByChild('user').equalTo(userEmail).on('value', (snapshot) => {
            if (currentTab !== 'keys') return;
            if (!snapshot.exists()) {
                list.innerHTML = '<div class="empty-msg">Bạn chưa mua Key nào.</div>';
                return;
            }

            let html = '';
            let orders = [];
            snapshot.forEach(child => { 
                let data = child.val();
                orders.push(data); 
            });
            
            orders.reverse().forEach(order => {
                // Truyền toàn bộ object order để nhận diện cả giá và ngày chuỗi
                const expiryInfo = getExpiryInfo(order);

                html += `
                <div class="history-item">
                    <a href="https://www.mediafire.com/file/v24zpj8xncg1zyf/Free_Fire_1.123.1_1777549111.ipa/file" target="_blank" class="download-square">
                        <i class="fas fa-cloud-download-alt"></i><span>TẢI IPA</span>
                    </a>
                    <div class="info-box">
                        <div class="title-text">${order.product}</div>
                        <div class="key-badge">
                            <span class="key-text">${order.key}</span>
                            <i class="fas fa-copy" style="font-size:0.7rem; cursor:pointer;" onclick="copyKey('${order.key}')"></i>
                        </div>
                    </div>
                    <div class="status-box">
                        <span class="status-label">THỜI HẠN</span>
                        <span class="status-value" style="color:#fbbf24">${expiryInfo.label}</span>
                        <span class="expiry-date">${expiryInfo.date}</span>
                    </div>
                </div>`;
            });
            list.innerHTML = html;
        });
    }

    function loadRechargeHistory() {
        const list = document.getElementById('content-list');
        list.innerHTML = '<div class="empty-msg">Đang tải lịch sử nạp...</div>';

        database.ref('RechargeHistory').orderByChild('email').equalTo(userEmail).on('value', (snapshot) => {
            if (currentTab !== 'recharge') return;
            if (!snapshot.exists()) {
                list.innerHTML = '<div class="empty-msg">Chưa có lịch sử giao dịch thành công.</div>';
                return;
            }

            let html = '';
            let items = [];
            snapshot.forEach(child => { items.push(child.val()); });

            items.reverse().forEach(item => {
                const statusColor = item.status === 'success' ? '#10b981' : '#ef4444';
                const statusText = item.status === 'success' ? 'THÀNH CÔNG' : 'BỊ TỪ CHỐI';

                html += `
                <div class="history-item">
                    <div class="recharge-icon"><i class="fas fa-receipt"></i></div>
                    <div class="info-box">
                        <div class="title-text">+${item.amount.toLocaleString()}đ</div>
                        <div class="sub-text">${item.date || 'Giao dịch'}</div>
                        <div class="sub-text" style="font-size:0.6rem; margin-top:2px; color:#6366f1">Nội dung: ${item.content || 'Nạp tiền hệ thống'}</div>
                    </div>
                    <div class="status-box">
                        <span class="status-label">TRẠNG THÁI</span>
                        <span class="status-value" style="color:${statusColor}">${statusText}</span>
                    </div>
                </div>`;
            });
            list.innerHTML = html;
        });
    }

    function copyKey(text) {
        navigator.clipboard.writeText(text).then(() => alert("✅ Đã copy Key!"));
    }

// --- LOGIC NHẠC ---
const audio = document.getElementById("myAudio");
const musicBtn = document.getElementById("musicBtn");
const musicContainer = document.getElementById("musicContainer");

function updateMusicUI(isPlaying) {
    if (isPlaying) {
        musicBtn.classList.add('playing');
        musicBtn.innerHTML = '<i class="fas fa-pause"></i>';
        if(musicContainer) musicContainer.classList.add('active');
    } else {
        musicBtn.classList.remove('playing');
        musicBtn.innerHTML = '<i class="fas fa-music"></i>';
        if(musicContainer) musicContainer.classList.remove('active');
    }
}

function playMusic() {
    audio.play().then(() => {
        localStorage.setItem('musicPlaying', 'true');
        updateMusicUI(true);
        document.removeEventListener('click', playMusic);
        document.removeEventListener('touchstart', playMusic);
    }).catch(err => console.log("Chờ tương tác..."));
}

if (localStorage.getItem('musicPlaying') !== 'false') {
    document.addEventListener('click', playMusic);
    document.addEventListener('touchstart', playMusic);
}

function toggleMusic() {
    if (audio.paused) {
        audio.play();
        localStorage.setItem('musicPlaying', 'true');
        updateMusicUI(true);
    } else {
        audio.pause();
        localStorage.setItem('musicPlaying', 'false');
        updateMusicUI(false);
    }
}

audio.addEventListener('timeupdate', () => {
    localStorage.setItem('musicTime', audio.currentTime);
});

window.addEventListener('load', () => {
    const savedTime = localStorage.getItem('musicTime');
    const isPlaying = localStorage.getItem('musicPlaying');
    if (savedTime) audio.currentTime = parseFloat(savedTime);
    if (isPlaying === 'true') {
        playMusic();
    }
});
</script>
</body>
</html>
