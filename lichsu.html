<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
        --primary: #06b6d4; --secondary: #3b82f6; --dark-bg: #020617; 
        --card-bg: rgba(30, 41, 59, 0.5); --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #f8fafc; --text-sub: #94a3b8;
    }
    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--dark-bg); color: var(--text-main);
        background-image: radial-gradient(circle at 50% 0%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
        min-height: 100vh; overflow-x: hidden; padding-bottom: 80px;
    }
    .container { max-width: 600px; margin: 0 auto; padding: 15px; }
    
    .header { margin-bottom: 20px; padding-top: 10px; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 1.3rem; font-weight: 800; }
    .back-btn { width: 38px; height: 38px; border-radius: 10px; background: var(--card-bg); border: 1px solid var(--glass-border); color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; }

    .tab-container {
        display: flex; background: rgba(0,0,0,0.2); border-radius: 14px;
        padding: 5px; margin-bottom: 20px; border: 1px solid var(--glass-border);
    }
    .tab-btn {
        flex: 1; padding: 10px; border: none; background: transparent;
        color: var(--text-sub); font-weight: 700; font-size: 0.85rem;
        cursor: pointer; border-radius: 10px; transition: 0.3s;
    }
    .tab-btn.active {
        background: var(--primary); color: white;
        box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
    }

    .history-item {
        background: var(--card-bg); border: 1px solid var(--glass-border);
        border-radius: 16px; padding: 12px; margin-bottom: 12px;
        display: flex; align-items: center; gap: 12px; backdrop-filter: blur(10px);
    }

    .download-square {
        min-width: 50px; height: 50px;
        background: linear-gradient(135deg, var(--primary), #3b82f6);
        border-radius: 10px; display: flex; flex-direction: column;
        align-items: center; justify-content: center; color: white;
        text-decoration: none; font-size: 0.55rem; font-weight: 800; text-align: center; flex-shrink: 0;
    }
    .download-square i { font-size: 1.1rem; margin-bottom: 1px; }
    .download-square.disabled { background: #1e293b; opacity: 0.5; cursor: not-allowed; pointer-events: none; }

    .recharge-icon {
        min-width: 50px; height: 50px; background: rgba(16, 185, 129, 0.1);
        border-radius: 10px; display: flex; align-items: center; justify-content: center;
        color: #10b981; font-size: 1.2rem; border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .info-box { flex-grow: 1; min-width: 0; } 
    .title-text { font-weight: 700; font-size: 0.85rem; color: #fff; margin-bottom: 4px; }
    .sub-text { font-size: 0.7rem; color: var(--text-sub); }

    .key-badge { 
        display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; 
        background: rgba(0,0,0,0.3); padding: 8px 10px; border-radius: 8px; 
        margin-top: 5px; border: 1px solid rgba(255,255,255,0.05);
        width: 100%;
    }
    .key-text { 
        font-family: monospace; color: #4ade80; font-size: 0.7rem; font-weight: 700; 
        word-break: break-all; line-height: 1.4;
    }
    
    .status-box { 
        min-width: 90px; text-align: right; border-left: 1px solid rgba(255,255,255,0.1);
        padding-left: 8px; flex-shrink: 0;
    }
    .status-label { font-size: 0.55rem; color: var(--text-sub); display: block; margin-bottom: 2px; }
    .status-value { font-weight: 800; font-size: 0.85rem; display: block; }
    .expiry-date { font-size: 0.6rem; color: #94a3b8; margin-top: 2px; display: block; font-weight: 500; }

    .empty-msg { text-align: center; padding: 40px; color: var(--text-sub); font-size: 0.9rem; }

    .music-player {
        position: fixed; bottom: 20px; left: 20px; z-index: 999;
        display: flex; align-items: center; gap: 12px;
        background: rgba(15, 23, 42, 0.8); padding: 8px 12px; border-radius: 50px;
        border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
        transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .music-info { width: 0; overflow: hidden; opacity: 0; transition: 0.5s; display: flex; flex-direction: column; gap: 4px; }
    .music-player.active .music-info { width: 140px; opacity: 1; }
    .music-btn {
        width: 40px; height: 40px; border-radius: 50%; 
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); } 100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); } }
    .playing { animation: pulse-glow 2s infinite; }
</style>
